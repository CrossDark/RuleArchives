        <h3>构建网站</h3>
        <p>网站有一个<code>Makefile</code>来自动化构建过程。要构建网站，请运行：</p>
        <pre><code data-lang="sh"><span style="color: #4b69c6">make</span> html</code></pre>
        <p>这个命令将<code>content/</code>目录中的所有<code>.typ</code>文件编译成<code>_site/</code>目录中的HTML文件。您可以在浏览器中打开<code>_site/index.html</code>来查看网站。</p>
