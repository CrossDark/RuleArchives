        <h2>kych</h2>
        <h2>规则怪谈档案馆</h2>
        <p>一个基于<code>Typst</code>和<code>tufted</code>构建的规则怪谈静态网站</p>
        <h2>创作指南</h2>
        <ol start="1">
          <li>分支本仓库并创建一个新的分支</li>
          <li>选择相符的分类,复制其中的<code>模板</code>文件夹,按照其中的说明进行编写</li>
          <li>在本地的仓库根目录<em>有<code>Makefile</code>的目录</em>运行<code>make html</code>编译网站,检查是否有错误</li>
          <li>推送到Github并创建PR</li>
          <li>等待PR通过</li>
        </ol>
        <blockquote>
          <p>[!NOTE]</p>
          <p>如果你嫌麻烦或者打不开GitHub,可以把源文件私信发给我,我会帮你转成typst更新</p>
        </blockquote>
      </section>
